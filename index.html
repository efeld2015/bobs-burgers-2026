<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>

  <!-- Main Content -->
  <body>
    <section>
      <header>
        <img
          src="Bob's_Burgers_logo.svg.png"
          height="200"
          width="550"
          alt="Bob's Burgers restaurant logo"
        />
      </header>
      <h1>Burger of the Day Generator</h1>
    </section>

    <div class="dashboard-container">
    <section class="burgBtn-section">
      <a href="#" class="burgBtn"
        ><img
          src="hamburger.png"
          height="100"
          width="100"
          alt="hamburger cartoon"
      /></a>
      <p class="click">Click</p>
    </section>

    <section class="menuSection">
      <h2 class="burgerMenu">Burger of the Day</h2>
    </section>

    <section class="statsSection">
      <h2 class="season">Featured in Season:</h2>
      <p class="seasonResult">Placeholder</p>

      <h2 class="ep">Episode:</h2>
      <p class="epResult">Placeholder</p>
    </section>
    </div>

    <footer>
      <p>Sources:</p>
      <a
        href="https://www.flaticon.com/free-icons/hamburger"
        title="hamburger icons"
        >Hamburger icons created by Freepik - Flaticon</a
      >
    </footer>
    <script src="main.js"></script>
  </body>
</html>
